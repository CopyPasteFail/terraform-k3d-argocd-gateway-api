apiVersion: v1
kind: ConfigMap
metadata:
  name: landing-html
  namespace: landing
  labels:
    app.kubernetes.io/name: landing
data:
  index.html: |
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>Local Platform</title>
      <style>
        body {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          margin: 2rem;
          line-height: 1.5;
          color: #111827;
          background: #f9fafb;
        }
        main {
          max-width: 36rem;
          margin: 0 auto;
          padding: 1.5rem;
          border: 1px solid #e5e7eb;
          background: #ffffff;
          border-radius: 0.5rem;
        }
        h1 {
          margin-top: 0;
        }
        ul {
          padding-left: 1.25rem;
        }
      </style>
    </head>
    <body>
      <main>
        <h1>terraform-k3d-argocd-gateway-api</h1>
        <p>Public entrypoints:</p>
        <ul>
          <li><a href="/argocd">/argocd</a></li>
          <li><a href="/whoami">/whoami</a></li>
        </ul>
      </main>
    </body>
    </html>
