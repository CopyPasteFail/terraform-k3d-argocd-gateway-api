apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing
  namespace: landing
  labels:
    app.kubernetes.io/name: landing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: landing
  template:
    metadata:
      labels:
        app.kubernetes.io/name: landing
    spec:
      containers:
      - name: nginx
        image: nginx:1.27.5-alpine
        ports:
        - name: http
          containerPort: 80
        volumeMounts:
        - name: landing-html
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
          readOnly: true
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3
        resources:
          requests:
            cpu: 20m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
      volumes:
      - name: landing-html
        configMap:
          name: landing-html
