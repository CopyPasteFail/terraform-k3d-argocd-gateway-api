apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-routes-system-to-landing-service
  namespace: landing
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: routes-system
  to:
  - group: ""
    kind: Service
    name: landing
